{% extends "base.html" %}
{% block title %}🌸Flower Store🌸{% endblock %}

{% block main %}
    <h1>Search Results for "{{ search_term }}" </h1>
    <!-- Filter / Sort form -->
    <form>
        {{ index_form }}
        <!-- Preserve current search query -->
        <input type="hidden" name="search" value="{{ search_term }}">
        <button>Apply</button>
    </form>

    {% if products %}
        {% include "products/snippets/product_list.html" %}
    {% else %}
        <p>No products found.</p>
    {% endif %}

{% endblock main %}
