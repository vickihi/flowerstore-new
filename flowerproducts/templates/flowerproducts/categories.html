{% extends "base.html" %}


{% block main %}
    <h1>Categories</h1>

    <ul class="category-list">

        {% for category in categories %}


            <li>
                <a href="{% url 'flowerproducts:category' category.id %}">
                    {{ category.name }}
                </a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
