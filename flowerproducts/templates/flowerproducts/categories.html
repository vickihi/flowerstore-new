{% extends "base.html" %}

{% block breadcrumbs %}
<div class="breadcrumb">
    <a href="{% url 'flowerproducts:index' %}">Home</a> /
    Categories
</div>
{% endblock %}
{% block main %}
    <h1>Categories</h1>

    <ul class="category-list">

        {% for category in categories %}

            <li>
                 <a href="{% url 'flowerproducts:category' category.id %}">
                {{ category.name }}
            </a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
