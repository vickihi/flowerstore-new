{% load static %}

<ul class="product-list">
    {% for product in products %}
    <li class="product-card">
        <a class="product-card__stretched-link" href="{% url 'flowerproducts:product_detail' product.id %}"
            aria-label="View {{ product.name }}"></a>
        <div class="product-image-stack">
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}" class="product-image product-image--default">
            {% else %}
                <img src="{% static 'images/default_flower.png' %}" alt="Default flower" class="product-image product-image--default">
            {% endif %}

            {% if product.hover_image %}
                <img src="{{ product.hover_image.url }}" alt="{{ product.name }} alternate view" class="product-image product-image--hover">
            {% endif %}
            <span class="product-hover-cta" aria-hidden="true">+ Add to cart</span>
        </div>
        <h3 class="product-name">
            <a href="{% url 'flowerproducts:product_detail' product.id %}">
                {{ product.name }}
            </a>
        </h3>
        <p class="product-price">${{ product.price }} CAD</p>
    </li>
    {% endfor %}
</ul>
