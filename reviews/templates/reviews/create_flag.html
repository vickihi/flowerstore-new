{% extends "base.html" %}
{% load static %}
{% block title %} Flag this Review {% endblock %}

{% block main %}
    <h1>Flag Review</h1>

    {% include "flowerproducts/snippets/single_review.html" %}

    <form method="post" action="{% url 'reviews:create_flag_submit' review.id %}" class="flag-form">
        {% csrf_token %}
        {{ form }}
        <button type="submit" class="btn btn-flag-submit">Report review</button>
    </form>

{% endblock %}
